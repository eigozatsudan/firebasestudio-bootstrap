services:
  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
    ports:
      - ":5173"

  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
      
  db:
    image: postgres:16
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data # データの永続化
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres

  # Firebase Studioでは"http://localhost"が使えないので、Nginxでリバースプロキシする（ブラウザからAPIのコンテナにアクセスできない）
  nginx:
      image: nginx:alpine
      volumes:
        - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      ports:
        - "${PORT:-8080}:80"
      depends_on:
        - frontend
        - backend

volumes:
  postgres_data: